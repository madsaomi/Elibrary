{% load i18n %}
<!DOCTYPE html>
{% load static i18n %}
<html lang="{{ current_language|default:'ru' }}" data-theme="{{ theme|default:'light' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% trans "Библиотечная система" %}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://unpkg.com/htmx.org@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
      // Единая тема для Chart.js (адаптация под светлую/тёмную)
      (function() {
        if (!window.Chart) return;
        var css = getComputedStyle(document.documentElement);
        var text = css.getPropertyValue('--color-text-muted').trim() || '#64748b';
        var border = css.getPropertyValue('--color-border').trim() || '#e2e8f0';
        Chart.defaults.color = text;
        Chart.defaults.borderColor = border;
        Chart.defaults.font.family = "system-ui, -apple-system, 'Segoe UI', sans-serif";
        Chart.defaults.plugins.legend.labels.color = text;
      })();
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
    <script>
      document.addEventListener('DOMContentLoaded', function() { if(window.lucide) lucide.createIcons(); });
      document.body.addEventListener('htmx:afterSwap', function() { if(window.lucide) lucide.createIcons(); });
    </script>
</body>
</html>
