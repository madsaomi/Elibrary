{% extends 'base.html' %}
{% load i18n static %}
{% block title %}{% trans "Вход в систему" %}{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-split-image">
        <img src="{% static 'images/illustrations/login.png' %}" alt="Login Illustration" class="animate-float">
    </div>
    <div class="login-split-form">
        <div class="login-card">
            <h2 class="mb-1"><i data-lucide="book-open" style="width:2rem;height:2rem;vertical-align:middle;color:var(--color-primary);"></i> Biblio</h2>
            <p>{% trans "Вход в школьную библиотечную систему" %}</p>
            {% if error %}
            <div class="error text-center mb-2">{{ error }}</div>
            {% endif %}
            <form method="post" action="{% url 'accounts:login_submit' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">{% trans "Логин" %}</label>
                    <input type="text" name="login" class="form-input" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">{% trans "Пароль" %}</label>
                    <input type="password" name="password" class="form-input" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-full justify-center" style="font-size: 1.1rem; padding: 0.85rem;"><i data-lucide="log-in" style="width:1.25rem;height:1.25rem;vertical-align:middle;"></i> {% trans "Войти" %}</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
