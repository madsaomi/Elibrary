{% extends 'base.html' %}
{% load i18n static %}
{% block title %}{% trans "Вход в систему" %}{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <img src="{% static 'images/logo.svg' %}" alt="Biblio" class="logo-img">
        </div>
        <h1 class="login-brand">Biblio</h1>
        <p class="login-desc">{% trans "Вход в школьную библиотечную систему" %}</p>
        {% if error %}
        <div class="error text-center mb-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="{% url 'accounts:login_submit' %}" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">{% trans "Логин" %}</label>
                <input type="text" name="login" class="form-input" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">{% trans "Пароль" %}</label>
                <input type="password" name="password" class="form-input" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-full justify-center" style="font-size: 1.1rem; padding: 0.85rem;"><i data-lucide="log-in" class="icon-inline"></i> {% trans "Войти" %}</button>
        </form>
    </div>
</div>
{% endblock %}
