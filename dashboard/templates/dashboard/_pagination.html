{% load i18n %}
{% if page_obj.paginator.num_pages > 1 %}
<div class="flex justify-center gap-sm mt-3">
    {% if page_obj.has_previous %}
    <a href="?page={{ page_obj.previous_page_number }}{% for k, v in request.GET.items %}{% if k != 'page' %}&{{ k }}={{ v }}{% endif %}{% endfor %}" class="btn btn-outline btn-sm">←</a>
    {% endif %}
    <span class="text-muted px-1 py-05">{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a href="?page={{ page_obj.next_page_number }}{% for k, v in request.GET.items %}{% if k != 'page' %}&{{ k }}={{ v }}{% endif %}{% endfor %}" class="btn btn-outline btn-sm">→</a>
    {% endif %}
</div>
{% endif %}
